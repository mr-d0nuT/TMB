<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#da291c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Consulta en tiempo real los próximos buses, metros y trams de la parada más cercana a tu ubicación en Barcelona.">
    <title>Transport BCN</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚍</text></svg>">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --primary: #da291c;
            --primary-dark: #b01e13;
            --bg: #f2f4f8;
            --card: #ffffff;
            --text: #1a1d21;
            --text-soft: #5f6670;
            --text-faint: #9aa1ab;
            --border: #e4e7ec;
            --chip-bg: #ffffff;
            --green: #0a8f4e;
            --amber: #c77700;
            --blue: #1a73e8;
            --tram: #008e78;
            --shadow: 0 1px 3px rgba(16,24,40,.08), 0 4px 12px rgba(16,24,40,.06);
            --shadow-lg: 0 8px 24px rgba(16,24,40,.14);
            --radius: 16px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #101418;
                --card: #1b2026;
                --text: #eef1f4;
                --text-soft: #aab2bc;
                --text-faint: #6f7884;
                --border: #2a3138;
                --chip-bg: #232931;
                --green: #34c373;
                --amber: #f0a437;
                --tram: #15b89d;
                --shadow: 0 1px 3px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.3);
                --shadow-lg: 0 8px 24px rgba(0,0,0,.5);
            }
        }

        * { box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            background: var(--bg); color: var(--text); margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ---------- SPLASH ---------- */
        #splash-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity .45s ease-out; gap: 34px;
        }
        .img-donut { width: 150px; border-radius: 26px; box-shadow: var(--shadow-lg); animation: pulse 1.8s infinite; }
        .img-app { width: 80px; border-radius: 18px; box-shadow: var(--shadow); }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* ---------- HEADER ---------- */
        .topbar {
            position: sticky; top: 0; z-index: 1100;
            display: flex; align-items: center; justify-content: space-between;
            padding: calc(10px + env(safe-area-inset-top)) 16px 10px;
            background: color-mix(in srgb, var(--bg) 82%, transparent);
            -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
        }
        .topbar h1 { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: -.3px; }
        .topbar .subtitle { font-size: .68rem; font-weight: 700; color: var(--text-faint); letter-spacing: .6px; text-transform: uppercase; margin-top: 1px; }
        .live-badge {
            font-size: .7rem; font-weight: 700; color: var(--green);
            display: flex; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: .5px;
        }
        .live-badge::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.6s infinite; }

        main { padding: 14px 14px 50px; max-width: 640px; margin: 0 auto; }

        /* ---------- MAPA ---------- */
        .map-wrap { position: relative; margin-bottom: 14px; }
        #map {
            height: 300px; border-radius: var(--radius); box-shadow: var(--shadow);
            z-index: 1; border: 1px solid var(--border); background: var(--bg);
        }
        .map-fab {
            position: absolute; right: 12px; bottom: 12px; z-index: 1000;
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--card); color: var(--blue); border: 1px solid var(--border);
            box-shadow: var(--shadow-lg); font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform .15s;
        }
        .map-fab:active { transform: scale(.9); }
        .leaflet-container { font-family: inherit; }
        .leaflet-popup-content-wrapper { border-radius: 12px; background: var(--card); color: var(--text); box-shadow: var(--shadow-lg); }
        .leaflet-popup-tip { background: var(--card); }
        .leaflet-bar a { background: var(--card) !important; color: var(--text) !important; border-color: var(--border) !important; }

        .stop-pin svg { filter: drop-shadow(0 2px 3px rgba(0,0,0,.35)); transition: transform .15s; transform-origin: bottom center; }
        .stop-pin.selected svg { transform: scale(1.25); }
        .user-dot-wrap { position: relative; }
        .user-dot-core {
            width: 16px; height: 16px; border-radius: 50%; background: var(--blue);
            border: 3px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.4); position: relative; z-index: 2;
        }
        .user-dot-halo {
            position: absolute; top: 50%; left: 50%; width: 16px; height: 16px;
            border-radius: 50%; background: var(--blue); opacity: .35;
            transform: translate(-50%,-50%); animation: halo 2s ease-out infinite; z-index: 1;
        }
        @keyframes halo { 0% { transform: translate(-50%,-50%) scale(1); opacity: .4; } 100% { transform: translate(-50%,-50%) scale(3.2); opacity: 0; } }

        /* ---------- BUSCADOR ---------- */
        .controls { display: flex; gap: 8px; margin-bottom: 14px; }
        input[type=number] {
            flex: 1; min-width: 0; padding: 13px 14px; border: 1px solid var(--border); border-radius: 12px;
            font-size: 1rem; font-weight: 700; text-align: center; background: var(--card); color: var(--text);
            -moz-appearance: textfield; appearance: textfield; outline: none; transition: border-color .15s;
        }
        input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input[type=number]:focus { border-color: var(--primary); }
        input::placeholder { color: var(--text-faint); font-weight: 500; }
        button { font-family: inherit; }
        .btn {
            border: none; border-radius: 12px; padding: 13px 16px; font-size: .95rem; font-weight: 700;
            cursor: pointer; transition: transform .12s, filter .15s; white-space: nowrap;
        }
        .btn:active { transform: scale(.95); }
        .btn-search { background: var(--primary); color: #fff; }
        .btn-gps { background: var(--card); color: var(--text); border: 1px solid var(--border); }

        /* ---------- CHIPS DE PARADAS ---------- */
        .chips-label { font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(--text-faint); margin: 2px 4px 7px; }
        .chips-row { display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .chips-row::-webkit-scrollbar { display: none; }
        .chip {
            flex-shrink: 0; display: flex; align-items: center; gap: 7px;
            background: var(--chip-bg); border: 1px solid var(--border); border-radius: 999px;
            padding: 9px 14px; font-size: .85rem; font-weight: 600; color: var(--text);
            cursor: pointer; box-shadow: var(--shadow); transition: transform .12s; max-width: 260px;
        }
        .chip:active { transform: scale(.96); }
        .chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
        .chip.active .chip-dist, .chip.active .chip-star { color: rgba(255,255,255,.85); }
        .chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chip-dist { font-size: .75rem; color: var(--text-faint); font-weight: 700; white-space: nowrap; }
        .chip-star { color: var(--amber); }
        .chip-mode { font-size: .95rem; }

        /* ---------- PARADA ACTUAL ---------- */
        .stop-card {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: var(--shadow); padding: 14px 16px 12px; margin-bottom: 12px; display: none;
        }
        .stop-card-top { display: flex; align-items: flex-start; gap: 10px; }
        .stop-card-info { flex: 1; min-width: 0; }
        .stop-name { font-size: 1.05rem; font-weight: 800; line-height: 1.25; }
        .stop-code { font-size: .8rem; color: var(--text-faint); font-weight: 600; margin-top: 2px; }
        .fav-btn {
            background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 2px 4px;
            color: var(--text-faint); line-height: 1; transition: transform .15s;
        }
        .fav-btn:active { transform: scale(1.25); }
        .fav-btn.faved { color: var(--amber); }
        .refresh-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .progress-track { flex: 1; height: 4px; border-radius: 4px; background: var(--border); overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; border-radius: 4px; background: var(--green); transition: width 1s linear; }
        .refresh-text { font-size: .75rem; color: var(--text-faint); font-weight: 600; white-space: nowrap; }
        .refresh-now { background: none; border: none; font-size: 1.05rem; cursor: pointer; padding: 0 2px; color: var(--text-soft); }

        /* ---------- ESTADOS ---------- */
        .error-msg {
            background: color-mix(in srgb, var(--primary) 10%, var(--card)); color: var(--primary);
            border: 1px solid color-mix(in srgb, var(--primary) 30%, transparent);
            padding: 14px; border-radius: var(--radius); font-size: .92rem; font-weight: 600;
            display: none; margin-bottom: 14px; text-align: center;
        }
        .error-msg button { margin-top: 10px; display: inline-block; background: var(--primary); color: #fff; }
        .status-msg { text-align: center; color: var(--text-soft); padding: 14px 0 6px; font-weight: 600; font-size: .92rem; display: none; }

        /* skeleton */
        .skeleton-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; display: flex; gap: 14px; align-items: center; }
        .sk { background: linear-gradient(90deg, var(--border) 25%, color-mix(in srgb, var(--border) 40%, var(--card)) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ---------- TARJETAS DE LLEGADAS ---------- */
        .bus-list { display: flex; flex-direction: column; gap: 10px; }
        .bus-card {
            background: var(--card); border-radius: var(--radius); border: 1px solid var(--border);
            box-shadow: var(--shadow); overflow: hidden; animation: slideUp .3s ease both;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        .bus-card-content { padding: 13px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .bus-card-content:active { background: color-mix(in srgb, var(--text) 4%, var(--card)); }
        .bus-line {
            color: #fff; padding: 8px 10px; border-radius: 9px; font-size: 1.15rem; font-weight: 900;
            min-width: 56px; text-align: center; letter-spacing: -.5px; box-shadow: inset 0 -2px 0 rgba(0,0,0,.18);
        }
        .bus-info { flex: 1; min-width: 0; }
        .bus-dest { font-size: .82rem; color: var(--text-soft); font-weight: 700; text-transform: uppercase; letter-spacing: .2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bus-dest-label { font-size: .68rem; color: var(--text-faint); font-weight: 600; }
        .bus-next { font-size: .72rem; color: var(--text-faint); font-weight: 600; margin-top: 2px; }
        .bus-eta { text-align: right; }
        .bus-time { font-size: 1.55rem; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; }
        .bus-time small { font-size: .75rem; font-weight: 600; color: var(--text-faint); margin-left: 3px; }
        .bus-time.soon { color: var(--green); }
        .bus-time.now { color: var(--primary); animation: blinkSoft 1.1s infinite; font-size: 1.15rem; text-transform: uppercase; }
        @keyframes blinkSoft { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
        .bus-chevron { color: var(--text-faint); font-size: .8rem; transition: transform .25s; }
        .bus-card.open .bus-chevron { transform: rotate(180deg); }
        .blink { animation: flash .8s ease-out; }
        @keyframes flash { 0% { opacity: .4; } 100% { opacity: 1; } }

        /* ---------- ITINERARIO ---------- */
        .bus-itinerary { display: none; background: color-mix(in srgb, var(--text) 3%, var(--card)); border-top: 1px solid var(--border); padding: 14px 18px; max-height: 260px; overflow-y: auto; }
        .itinerary-node { display: flex; align-items: center; gap: 14px; position: relative; padding: 7px 0; }
        .itinerary-node::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 3px; background: var(--border); z-index: 1; border-radius: 2px; }
        .itinerary-node:first-child::before { top: 50%; }
        .itinerary-node:last-child::before { bottom: 50%; }
        .node-dot { width: 17px; height: 17px; border-radius: 50%; z-index: 2; flex-shrink: 0; border: 3.5px solid var(--card); box-shadow: 0 0 0 1px var(--border); }
        .node-name { font-size: .86rem; color: var(--text-soft); }
        .node-name.hl { font-weight: 800; color: var(--text); }
        .loader-small { border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; width: 16px; height: 16px; animation: spin .9s linear infinite; display: inline-block; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 28px 16px; color: var(--text-faint); font-weight: 600; }
        .empty-state .big { font-size: 2.2rem; margin-bottom: 8px; }

        footer { text-align: center; font-size: .72rem; color: var(--text-faint); padding: 26px 0 10px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="./assets/logo_donut.png" alt="Mr Donut" class="img-donut" onerror="this.style.display='none'">
        <img src="https://cdn-icons-png.flaticon.com/512/3448/3448339.png" alt="Bus App Logo" class="img-app">
    </div>

    <header class="topbar">
        <div>
            <h1>🚍 Transport BCN</h1>
            <div class="subtitle">Bus · Metro · Tram</div>
        </div>
        <div class="live-badge">En directo</div>
    </header>

    <main>
        <div class="map-wrap">
            <div id="map"></div>
            <button class="map-fab" onclick="searchGPS()" title="Buscar transporte cerca de mí" aria-label="Buscar transporte cerca de mí">📍</button>
        </div>

        <div class="controls">
            <input type="number" id="stopCode" placeholder="Nº parada de bus" inputmode="numeric" onkeydown="if(event.key==='Enter')searchManual()">
            <button class="btn btn-search" onclick="searchManual()">Buscar</button>
            <button class="btn btn-gps" onclick="searchGPS()">📍 Cerca de mí</button>
        </div>

        <div id="favSection" style="display:none">
            <div class="chips-label">⭐ Favoritas</div>
            <div id="favChips" class="chips-row"></div>
        </div>

        <div id="nearbySection" style="display:none">
            <div class="chips-label">Paradas cercanas</div>
            <div id="nearbyChips" class="chips-row"></div>
        </div>

        <div id="errorBox" class="error-msg" role="alert"></div>
        <div id="loading" class="status-msg" aria-live="polite"></div>

        <div id="stopCard" class="stop-card">
            <div class="stop-card-top">
                <div class="stop-card-info">
                    <div class="stop-name" id="stopName"></div>
                    <div class="stop-code" id="stopCodeLabel"></div>
                </div>
                <button class="fav-btn" id="favBtn" onclick="toggleFav()" title="Guardar en favoritas" aria-label="Guardar en favoritas">★</button>
            </div>
            <div class="refresh-row">
                <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
                <span class="refresh-text" id="refreshText"></span>
                <button class="refresh-now" onclick="refreshNow()" title="Actualizar ahora" aria-label="Actualizar ahora">🔄</button>
            </div>
        </div>

        <div id="results" class="bus-list"></div>

        <footer>Datos en tiempo real de TMB y TRAM · Mapa © OpenStreetMap © CARTO</footer>
    </main>

    <script>
        // --- 1. SPLASH (se cierra sí o sí, aunque falle el resto) ---

            const splash = document.getElementById('splash-screen');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }
        }, 1600);

        // --- 2. CONSTANTES Y ESTADO ---
        const APP_ID = 'f87364db';
        const APP_KEY = 'fb9898a5d8988e645bba1a6eaa956b65';
        const TMB_AUTH = `app_id=${APP_ID}&app_key=${APP_KEY}`;
        const REFRESH_SECONDS = 20;

        const OVERPASS_ENDPOINTS = [

        let map, markersLayer, userMarkerLayer, routeLayer, tileLayer;
        let countdownInterval = null;
        let secondsLeft = REFRESH_SECONDS;
        let currentStop = null;          // { type:'bus'|'metro'|'tram', name, ... }
        let nearbyStops = [];
        let stopMarkers = {};            // stopKey -> L.marker
        let activeRoute = null;          // { key, ... } itinerario desplegado
        let activeRouteHTML = "";
        let fetchSeq = 0;                // descarta respuestas obsoletas

        const MODE_ICON = { bus: '🚌', metro: 'Ⓜ️', tram: '🚊' };
        const MODE_NAME = { bus: 'Bus', metro: 'Metro', tram: 'Tram' };

        // Colores oficiales TMB por familia de línea de bus
        function busColor(line) {
            const l = String(line).toUpperCase();
            if (l.startsWith('H')) return '#003888';
            if (l.startsWith('V')) return '#6ab023';
            if (l.startsWith('D')) return '#93107e';
            if (l.startsWith('X')) return '#1a1a1a';
            return '#da291c';
        }
        // Colores oficiales de las líneas de metro
        const METRO_COLORS = { L1:'#CE1126', L2:'#93248F', L3:'#1EB53A', L4:'#F7A30E', L5:'#005A97', L9:'#FB712B', L9N:'#FB712B', L9S:'#FB712B', L10:'#00A6D6', L10N:'#00A6D6', L10S:'#00A6D6', L11:'#89B94C', FM:'#004C38' };
        const metroColor = l => METRO_COLORS[String(l).toUpperCase()] || '#CE1126';
        const TRAM_COLOR = '#008e78';

        // --- 3. MAPA (CARTO Voyager: gratis, sin API key, estética tipo Google Maps) ---
        const darkScheme = window.matchMedia('(prefers-color-scheme: dark)');

        function tileURL() {
            return darkScheme.matches
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
        }

        function initMap() {
            map = L.map('map', { zoomControl: true }).setView([41.3879, 2.1699], 14);
            tileLayer = L.tileLayer(tileURL(), {
                attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
            userMarkerLayer = L.layerGroup().addTo(map);
            routeLayer = L.featureGroup().addTo(map);
            darkScheme.addEventListener('change', () => tileLayer.setUrl(tileURL()));
        }

        function stopPinIcon(type, selected) {
            const colors = { bus: '#e8554a', metro: '#CE1126', tram: '#008e78' };
            const color = colors[type] || colors.bus;
            const glyph = type === 'metro'
                ? '<text x="17" y="21" font-size="15" font-weight="900" fill="#fff" text-anchor="middle" font-family="Arial">M</text>'
                : `<text x="17" y="22" font-size="14" text-anchor="middle">${type === 'tram' ? '🚊' : '🚌'}</text>`;
            return L.divIcon({
                className: '',
                html: `<div class="stop-pin ${selected ? 'selected' : ''}">
                        <svg width="34" height="42" viewBox="0 0 34 42">
                          <path d="M17 1C8.7 1 2 7.7 2 16c0 10.5 15 25 15 25s15-14.5 15-25C32 7.7 25.3 1 17 1z" fill="${color}" stroke="#fff" stroke-width="2"/>
                          ${glyph}
                        </svg>
                       </div>`,
                iconSize: [34, 42], iconAnchor: [17, 41], popupAnchor: [0, -38]
            });
        }
        const userIcon = L.divIcon({
            className: '',
            html: '<div class="user-dot-wrap"><div class="user-dot-halo"></div><div class="user-dot-core"></div></div>',
            iconSize: [16, 16], iconAnchor: [8, 8]
        });

        // --- 4. INICIO ---
        window.onload = () => {
            try {
                initMap();
                renderFavs();
                searchGPS();
            } catch (error) {
                console.error("Error crítico al iniciar:", error);
                showError("Error al cargar el mapa. Intenta refrescar la página.");
            }
        };

        // --- 5. UTILIDADES ---
        function showError(msg, retryFn) {
            const errBox = document.getElementById('errorBox');
            errBox.innerHTML = msg + (retryFn ? `<br><button class="btn" onclick="${retryFn}()">Reintentar</button>` : '');
            errBox.style.display = 'block';
            setLoading(null);
            stopCountdown();
        }
        function hideError() { document.getElementById('errorBox').style.display = 'none'; }
        function setLoading(msg) {
            const el = document.getElementById('loading');
            el.style.display = msg ? 'block' : 'none';
            el.innerText = msg || '';
        }
        function showSkeleton(n = 3) {
            document.getElementById('results').innerHTML = Array.from({length: n}, () => `
                <div class="skeleton-card">
                    <div class="sk" style="width:56px;height:40px"></div>
                    <div style="flex:1"><div class="sk" style="height:12px;width:65%;margin-bottom:8px"></div><div class="sk" style="height:10px;width:40%"></div></div>
                    <div class="sk" style="width:52px;height:28px"></div>
                </div>`).join('');
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2)**2 + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        const fmtDist = m => m < 1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`;
        const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

        // Identificador único de una parada (para chips, marcadores y favoritos)
        const stopKey = s => `${s.type}:${s.type === 'bus' ? s.code : (s.type === 'metro' ? s.id : s.out)}`;

        // --- 6. AUTO-REFRESCO ---
        function startCountdown() {
            stopCountdown();
            secondsLeft = REFRESH_SECONDS;
            updateProgress();
            countdownInterval = setInterval(() => {
                secondsLeft--;
                if (secondsLeft <= 0) {
                    secondsLeft = REFRESH_SECONDS;
                    if (currentStop) fetchArrivals(currentStop, true);
                }
                updateProgress();
            }, 1000);
        }
        function stopCountdown() {
            clearInterval(countdownInterval);
            countdownInterval = null;
            document.getElementById('refreshText').innerText = '';
            document.getElementById('progressFill').style.width = '0%';
        }
        function updateProgress() {
            const pct = ((REFRESH_SECONDS - secondsLeft) / REFRESH_SECONDS) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('refreshText').innerText = `${secondsLeft}s`;
        }
        function refreshNow() {
            if (currentStop) {
                secondsLeft = REFRESH_SECONDS;
                fetchArrivals(currentStop, true);
            }
        }
        // Pausa el refresco cuando la app está en segundo plano
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) { clearInterval(countdownInterval); countdownInterval = null; }
            else if (currentStop) { fetchArrivals(currentStop, true); startCountdown(); }
        });

        // --- 7. FAVORITOS (localStorage) ---
        function getFavs() {
            try {
                const favs = JSON.parse(localStorage.getItem('busbcn_favs') || '[]');
                return favs.map(f => f.type ? f : { type: 'bus', code: f.code, name: f.name }); // migra favoritos antiguos
            } catch { return []; }
        }
        function saveFavs(favs) { localStorage.setItem('busbcn_favs', JSON.stringify(favs)); }
        function isFav(stop) { return getFavs().some(f => stopKey(f) === stopKey(stop)); }
        function toggleFav() {
            if (!currentStop) return;
            let favs = getFavs();
            if (isFav(currentStop)) favs = favs.filter(f => stopKey(f) !== stopKey(currentStop));
            else {
                const { type, name, code, id, out, ret } = currentStop;
                favs.push({ type, name, code, id, out, ret });
            }
            saveFavs(favs);
            updateFavBtn();
            renderFavs();
        }
        function updateFavBtn() {
            document.getElementById('favBtn').classList.toggle('faved', currentStop && isFav(currentStop));
        }
        function renderFavs() {
            const favs = getFavs();
            const section = document.getElementById('favSection');
            section.style.display = favs.length ? 'block' : 'none';
            document.getElementById('favChips').innerHTML = favs.map((f, i) => `
                <div class="chip ${currentStop && stopKey(currentStop) === stopKey(f) ? 'active' : ''}" onclick="selectFav(${i})">
                    <span class="chip-star">★</span>
                    <span class="chip-mode">${MODE_ICON[f.type]}</span>
                    <span class="chip-name">${esc(f.name)}</span>
                </div>`).join('');
        }
        function selectFav(i) {
            const f = getFavs()[i];
            if (f) fetchArrivals(f);
        }

        // --- 8. PARADAS CERCANAS (chips + marcadores) ---
        function renderNearbyChips() {
            const section = document.getElementById('nearbySection');
            section.style.display = nearbyStops.length ? 'block' : 'none';
            document.getElementById('nearbyChips').innerHTML = nearbyStops.map((s, i) => `
                <div class="chip ${currentStop && stopKey(currentStop) === stopKey(s) ? 'active' : ''}" onclick="selectNearbyStop(${i})">
                    <span class="chip-mode">${MODE_ICON[s.type]}</span>
                    <span class="chip-name">${esc(s.name)}</span>
                    <span class="chip-dist">${fmtDist(s.dist)}</span>
                </div>`).join('');
        }
        function selectNearbyStop(i) {
            const stop = nearbyStops[i];
            if (!stop) return;
            map.setView([stop.lat, stop.lon], 17);
            fetchArrivals(stop);
        }
        function highlightMarkers() {
            Object.entries(stopMarkers).forEach(([key, marker]) => {
                marker.setIcon(stopPinIcon(key.split(':')[0], currentStop && stopKey(currentStop) === key));
            });
        }

        // --- 9. LLEGADAS: DESPACHO POR TIPO ---
        async function fetchArrivals(stop, isSilent = false) {
            const seq = ++fetchSeq;
            currentStop = stop;

            if (!isSilent) {
                hideError();
                setLoading(null);
                showSkeleton();
                if (stop.type === 'bus') document.getElementById('stopCode').value = stop.code;
                routeLayer.clearLayers();
                activeRoute = null;
                activeRouteHTML = "";
            }

            try {
                let departures;
                if (stop.type === 'bus') departures = await fetchBusArrivals(stop);
                else if (stop.type === 'metro') departures = await fetchMetroArrivals(stop);
                else departures = await fetchTramArrivals(stop);

                if (seq !== fetchSeq) return; // llegó tarde: el usuario ya pidió otra parada

                renderStopCard(stop);
                renderDepartures(departures, isSilent);
                renderFavs();
                renderNearbyChips();
                highlightMarkers();
                startCountdown();
            } catch (err) {
                if (seq !== fetchSeq) return;
                if (!isSilent) {
                    document.getElementById('results').innerHTML = '';
                    renderStopCard(stop);
                    showError("No se han podido obtener los tiempos: " + err.message);
                }
            }
        }

        function renderStopCard(stop) {
            document.getElementById('stopCard').style.display = 'block';
            document.getElementById('stopName').innerText = stop.name || `Parada ${stop.code || ''}`;
            const sub = stop.type === 'bus' ? `${MODE_ICON.bus} Bus · Parada ${stop.code}`
                      : stop.type === 'metro' ? `${MODE_ICON.metro} Metro${stop.lines ? ' · ' + stop.lines : ''}`
                      : `${MODE_ICON.tram} Tram`;
            document.getElementById('stopCodeLabel').innerText = sub;
            updateFavBtn();
        }

        // Modelo unificado de salida:
        // { line, color, dest, mins, next (texto opcional), itin (datos para el desplegable) }
        function etaHTML(mins) {
            if (mins <= 0) return `<div class="bus-time now">Llegando</div>`;
            return `<div class="bus-time ${mins <= 3 ? 'soon' : ''}">${mins}<small>min</small></div>`;
        }

        function renderDepartures(departures, isSilent) {
            hideError();
            setLoading(null);
            const container = document.getElementById('results');

            if (!departures || departures.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="big">🌙</div>Sin llegadas previstas ahora mismo en esta parada.</div>`;
                return;
            }

            departures.sort((a, b) => a.mins - b.mins);
            window._departures = departures; // referencia para los desplegables
            let html = '';
            departures.forEach((d, i) => {
                const isExpanded = activeRoute && activeRoute.key === d.itinKey;
                html += `
                    <div class="bus-card ${isExpanded ? 'open' : ''}">
                        <div class="bus-card-content ${isSilent ? 'blink' : ''}" onclick="toggleItinerary(${i}, this.parentElement)">
                            <div class="bus-line" style="background:${d.color}">${esc(d.line)}</div>
                            <div class="bus-info">
                                <div class="bus-dest-label">hacia</div>
                                <div class="bus-dest">${esc(d.dest)}</div>
                                ${d.next ? `<div class="bus-next">${esc(d.next)}</div>` : ''}
                            </div>
                            <div class="bus-eta">${etaHTML(d.mins)}</div>
                            <div class="bus-chevron">▼</div>
                        </div>
                        <div class="bus-itinerary" style="display:${isExpanded ? 'block' : 'none'}" onclick="event.stopPropagation()">
                            ${isExpanded ? activeRouteHTML : ''}
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        // --- 10. LLEGADAS POR MODO ---
        async function fetchBusArrivals(stop) {
            const res = await fetch(`https://api.tmb.cat/v1/ibus/stops/${stop.code}?${TMB_AUTH}`);
            if (!res.ok) throw new Error('Parada de bus no encontrada en TMB.');
            const data = await res.json();
            return (data.data.ibus || []).map(b => ({
                line: b.line, color: busColor(b.line), dest: b.destination,
                mins: b['t-in-min'], next: null,
                itinKey: `bus:${b.routeId}`, itin: { mode: 'bus', routeId: b.routeId, stopCode: stop.code }
            }));
        }

        async function fetchMetroArrivals(stop) {
            const res = await fetch(`https://api.tmb.cat/v1/imetro/estacions/${stop.id}?${TMB_AUTH}`);
            if (!res.ok) throw new Error('Estación de metro no disponible.');
            const data = await res.json();
            if (!Array.isArray(data) || data.length === 0) {
                throw new Error('Esta estación no ofrece tiempos en tiempo real (líneas automáticas L9/L10).');
            }
            return data.filter(via => via.propers_trens && via.propers_trens.length > 0).map(via => {
                const t = via.propers_trens;
                const mins = Math.max(0, Math.round(t[0].temps_restant / 60));
                return {
                    line: t[0].nom_linia, color: metroColor(t[0].nom_linia), dest: t[0].desti_trajecte,
                    mins,
                    next: t[1] ? `Siguiente: ${Math.max(1, Math.round(t[1].temps_restant / 60))} min` : null,
                    itinKey: `metro:${via.codi_linia}:${via.codi_via}`,
                    itin: { mode: 'metro', lineCode: via.codi_linia, line: t[0].nom_linia, stationId: stop.id }
                };
            });
        }

        async function fetchTramProxy(path) {
            const target = 'https://opendata.tram.cat/api/v1/' + path;
            for (const wrap of TRAM_PROXIES) {
                try {
                    const ctrl = new AbortController();
                    const timer = setTimeout(() => ctrl.abort(), 9000);
                    const res = await fetch(wrap(target), { signal: ctrl.signal });
                    clearTimeout(timer);
                    if (res.ok) {
                        const j = await res.json();
                        if (Array.isArray(j)) return j;
                    }
                } catch (e) { /* prueba el siguiente proxy */ }
            }
            throw new Error('El servicio del TRAM no responde ahora mismo. Vuelve a intentarlo.');
        }

        async function fetchTramArrivals(stop) {
            const all = await fetchTramProxy('stopTimes');
            const mine = all.filter(t => t.code == stop.out || t.code == stop.ret);
            const now = Date.now();
            // agrupa por línea + destino y se queda con las 2 próximas llegadas
            const groups = {};
            mine.forEach(t => {
                const when = new Date(String(t.arrivalTime).replace(' ', 'T')).getTime();
                if (isNaN(when) || when < now - 30000) return;
                const k = `${t.lineName}|${t.destination}`;
                (groups[k] = groups[k] || []).push(when);
            });
            return Object.entries(groups).map(([k, times]) => {
                times.sort((a, b) => a - b);
                const [lineName, dest] = k.split('|');
                const mins = Math.max(0, Math.round((times[0] - now) / 60000));
                return {
                    line: 'T' + lineName, color: TRAM_COLOR, dest,
                    mins,
                    next: times[1] ? `Siguiente: ${Math.max(1, Math.round((times[1] - now) / 60000))} min` : null,
                    itinKey: `tram:${lineName}:${dest}`,
                    itin: { mode: 'tram', lineId: parseInt(lineName, 10), stopName: stop.name }
                };
            });
        }

        // --- 11. ITINERARIOS DESPLEGABLES ---
        async function toggleItinerary(index, cardElement) {
            const d = (window._departures || [])[index];
            if (!d) return;
            const itineraryDiv = cardElement.querySelector('.bus-itinerary');

            if (itineraryDiv.style.display === 'block') {
                itineraryDiv.style.display = 'none';
                cardElement.classList.remove('open');
                routeLayer.clearLayers();
                activeRoute = null;
                activeRouteHTML = "";
                return;
            }

            document.querySelectorAll('.bus-itinerary').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.bus-card').forEach(el => el.classList.remove('open'));
            routeLayer.clearLayers();

            activeRoute = { key: d.itinKey };
            cardElement.classList.add('open');
            itineraryDiv.style.display = 'block';
            itineraryDiv.innerHTML = '<div style="text-align:center; color:var(--text-soft); padding:10px;"><div class="loader-small"></div> Trazando ruta...</div>';

            try {
                let nodes; // [{ name, lat, lon, hl }] en orden de recorrido
                if (d.itin.mode === 'bus') nodes = await busItinerary(d.itin);
                else if (d.itin.mode === 'metro') nodes = await metroItinerary(d.itin);
                else nodes = await tramItinerary(d.itin);

                if (!activeRoute || activeRoute.key !== d.itinKey) return;

                let html = '<div>';
                const latlngs = [];
                nodes.forEach((n, i) => {
                    const isFirst = i === 0, isLast = i === nodes.length - 1;
                    const dotColor = isFirst ? '#da291c' : (isLast ? '#0a8f4e' : d.color);
                    latlngs.push([n.lat, n.lon]);
                    L.circleMarker([n.lat, n.lon], {
                        radius: (isFirst || isLast || n.hl) ? 7 : 4.5,
                        color: dotColor, fillColor: '#fff', fillOpacity: 1, weight: 3
                    }).bindPopup(`<b>${esc(n.name)}</b>`).addTo(routeLayer);
                    html += `
                        <div class="itinerary-node">
                            <div class="node-dot" style="background:${dotColor}"></div>
                            <div class="node-name ${isFirst || isLast || n.hl ? 'hl' : ''}">${esc(n.name)}${n.hl ? ' 📍' : ''}</div>
                        </div>`;
                });
                html += '</div>';

                L.polyline(latlngs, { color: d.color, weight: 5, opacity: .75 }).addTo(routeLayer);
                map.fitBounds(routeLayer.getBounds(), { padding: [25, 25] });

                itineraryDiv.innerHTML = html;
                activeRouteHTML = html;
            } catch (err) {
                itineraryDiv.innerHTML = `<div style="color:var(--primary); text-align:center; padding:10px; font-weight:600;">❌ ${esc(err.message)}</div>`;
                activeRouteHTML = itineraryDiv.innerHTML;
            }
        }

        // El routeId del iBus incluye línea y sentido: "2151" = línea 215, sentido 1
        async function busItinerary({ routeId, stopCode }) {
            const rid = parseInt(routeId, 10);
            const lineCode = Math.floor(rid / 10);
            const sentit = rid % 10;

            const res = await fetch(`https://api.tmb.cat/v1/transit/linies/bus/${lineCode}/parades?${TMB_AUTH}`);
            if (!res.ok) throw new Error('Ruta no disponible');
            const data = await res.json();

            const current = data.features.find(f => f.properties.CODI_PARADA == stopCode && f.properties.SENTIT == sentit)
                         || data.features.find(f => f.properties.CODI_PARADA == stopCode);
            if (!current) throw new Error('No se ha podido localizar el recorrido');

            return data.features
                .filter(f => f.properties.SENTIT === current.properties.SENTIT && f.properties.ORDRE >= current.properties.ORDRE)
                .sort((a, b) => a.properties.ORDRE - b.properties.ORDRE)
                .map(f => ({ name: f.properties.NOM_PARADA, lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0], hl: false }));
        }

        async function metroItinerary({ lineCode, stationId }) {
            const res = await fetch(`https://api.tmb.cat/v1/transit/linies/metro/${lineCode}/estacions?${TMB_AUTH}`);
            if (!res.ok) throw new Error('Línea no disponible');
            const data = await res.json();
            if (!data.features || data.features.length === 0) throw new Error('Línea no disponible');
            return data.features
                .sort((a, b) => a.properties.ORDRE_ESTACIO - b.properties.ORDRE_ESTACIO)
                .map(f => ({
                    name: f.properties.NOM_ESTACIO,
                    lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0],
                    hl: f.properties.CODI_ESTACIO == stationId
                }));
        }

        async function tramItinerary({ lineId, stopName }) {
            const stops = TRAM_LINES[String(lineId)];
            if (!stops) throw new Error('Línea no disponible');
            return stops.map(([name, lat, lon]) => ({ name, lat, lon, hl: name === stopName }));
        }

        // --- 12. BÚSQUEDA MANUAL (paradas de bus) ---
        function searchManual() {
            const code = document.getElementById('stopCode').value.trim();
            if (!code) {
                showError("Escribe el código de la parada de bus (está en el poste o marquesina).");
                return;
            }
            document.getElementById('stopCode').blur();
            fetchArrivals({ type: 'bus', code, name: `Parada ${code}` });
        }

        // --- 13. ESTACIONES DE METRO (TMB, con caché de 7 días) ---
        async function getMetroStations() {
            const CACHE_KEY = 'busbcn_metro_v1';
            let cached = null;
            try { cached = JSON.parse(localStorage.getItem(CACHE_KEY)); } catch {}
            if (cached && Date.now() - cached.t < 7 * 864e5) return cached.s;
            try {
                const res = await fetch(`https://api.tmb.cat/v1/transit/estacions?${TMB_AUTH}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                const s = data.features.map(f => ({
                    id: f.properties.ID_ESTACIO,
                    name: f.properties.NOM_ESTACIO,
                    lines: (String(f.properties.PICTO || '').match(/L\d+[NS]?|FM/g) || []).join(' · '),
                    lat: f.geometry.coordinates[1],
                    lon: f.geometry.coordinates[0]
                }));
                localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), s }));
                return s;
            } catch {
                return cached ? cached.s : []; // sin red: usa caché aunque caduque
            }
        }

        // --- 14. BÚSQUEDA POR GPS ---
        async function fetchOverpass(query) {
            for (const url of OVERPASS_ENDPOINTS) {
                try {
                    const res = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: `data=${encodeURIComponent(query)}`
                    });
                    if (res.ok) return await res.json();
                    console.warn("Servidor ocupado:", url);
                } catch (e) {
                    console.warn("Fallo de conexión con servidor:", url);
                }
            }
            throw new Error("overpass");
        }

        async function findBusStops(lat, lon) {
            // Empieza con 400 m y amplía si no hay nada
            for (const radius of [400, 900]) {
                const query = `[out:json][timeout:10];node["highway"="bus_stop"](around:${radius},${lat},${lon});out body;`;
                const osmData = await fetchOverpass(query);
                if (osmData.elements && osmData.elements.length > 0) {
                    return osmData.elements.map(e => {
                        const codeStr = e.tags.ref || e.tags['tmb:ref'] || e.tags['local_ref'] || "";
                        const cleanCode = codeStr.replace(/\D/g, '');
                        return {
                            type: 'bus',
                            code: (cleanCode.length > 0 && cleanCode.length <= 4) ? cleanCode : null,
                            name: e.tags.name || `Parada ${cleanCode}`,
                            lat: e.lat, lon: e.lon,
                            dist: getDistance(lat, lon, e.lat, e.lon)
                        };
                    }).filter(e => e.code !== null);
                }
            }
            return [];
        }

        function searchGPS() {
            hideError();
            stopCountdown();
            document.getElementById('results').innerHTML = '';
            document.getElementById('stopCard').style.display = 'none';
            currentStop = null;
            setLoading("📍 Buscando señal GPS...");
            routeLayer.clearLayers();

            if (!navigator.geolocation) {
                showError("Este dispositivo no soporta GPS.");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                setLoading("🗺️ Buscando bus, metro y tram cerca...");

                map.setView([lat, lon], 16);
                userMarkerLayer.clearLayers();
                L.marker([lat, lon], { icon: userIcon, zIndexOffset: 500 }).addTo(userMarkerLayer).bindPopup("<b>Estás aquí</b>");

                // Las tres redes en paralelo; si una falla, las otras siguen
                const [busRes, metroRes] = await Promise.allSettled([
                    findBusStops(lat, lon),
                    getMetroStations()
                ]);

                const busStops = busRes.status === 'fulfilled' ? busRes.value : [];
                const metroStops = (metroRes.status === 'fulfilled' ? metroRes.value : [])
                    .map(s => ({ type: 'metro', id: s.id, name: s.name, lines: s.lines, lat: s.lat, lon: s.lon, dist: getDistance(lat, lon, s.lat, s.lon) }))
                    .filter(s => s.dist <= 800);
                const tramStops = TRAM_STOPS
                    .map(([name, slat, slon, out, ret]) => ({ type: 'tram', name, out, ret, lat: slat, lon: slon, dist: getDistance(lat, lon, slat, slon) }))
                    .filter(s => s.dist <= 800);

                nearbyStops = [...busStops, ...metroStops, ...tramStops]
                    .sort((a, b) => a.dist - b.dist)
                    .slice(0, 15);

                if (nearbyStops.length === 0) {
                    const reason = busRes.status === 'rejected'
                        ? "El buscador de paradas está saturado. Inténtalo en unos minutos o busca por nº de parada."
                        : "No hay paradas de bus, metro ni tram a menos de 900 m de tu posición.";
                    showError(reason, "searchGPS");
                    return;
                }

                markersLayer.clearLayers();
                stopMarkers = {};
                nearbyStops.forEach(stop => {
                    const marker = L.marker([stop.lat, stop.lon], { icon: stopPinIcon(stop.type, false) }).addTo(markersLayer);
                    marker.bindPopup(`<b>${esc(stop.name)}</b><br><small>${MODE_NAME[stop.type]} · a ${fmtDist(stop.dist)}</small>`);
                    marker.on('click', () => {
                        map.setView([stop.lat, stop.lon], 17);
                        fetchArrivals(stop);
                    });
                    stopMarkers[stopKey(stop)] = marker;
                });
                renderNearbyChips();

                setLoading("⏱️ Conectando en tiempo real...");

                // Elige la parada más cercana con servicio ahora mismo
                let found = false;
                for (let i = 0; i < Math.min(nearbyStops.length, 3); i++) {
                    const stop = nearbyStops[i];
                    if (stop.type === 'tram') { fetchArrivals(stop); found = true; break; }
                    try {
                        const url = stop.type === 'bus'
                            ? `https://api.tmb.cat/v1/ibus/stops/${stop.code}?${TMB_AUTH}`
                            : `https://api.tmb.cat/v1/imetro/estacions/${stop.id}?${TMB_AUTH}`;
                        const res = await fetch(url);
                        if (!res.ok) continue;
                        const data = await res.json();
                        const hasService = stop.type === 'bus'
                            ? (data.data && data.data.ibus && data.data.ibus.length > 0)
                            : (Array.isArray(data) && data.length > 0);
                        if (hasService) {
                            fetchArrivals(stop);
                            found = true;
                            break;
                        }
                    } catch (e) { /* prueba la siguiente */ }
                }

                if (!found) fetchArrivals(nearbyStops[0]);

            }, () => {
                showError("No has dado permiso de ubicación o el GPS está desactivado. También puedes buscar por nº de parada.");
            }, { timeout: 10000, maximumAge: 30000 });
        }
    </script>
