<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus BCN Pro</title>
    
    <style>
        :root { --primary: #e30613; --bg: #f0f2f5; --card: #ffffff; --text: #333; --blue: #4285F4; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 15px; color: var(--text); overflow-x: hidden; }
        
        /* PANTALLA DE CARGA */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        .img-donut { width: 160px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 40px; animation: pulse 2s infinite; }
        .img-app { width: 90px; border-radius: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* CABECERA Y MAPA */
        .header { text-align: center; margin-bottom: 15px; margin-top: 5px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.8rem; letter-spacing: -0.5px; }
        
        #map { height: 280px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid #ddd; }

        /* CONTROLES */
        .controls { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; text-align: center; font-weight: bold; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-gps { background: #333; width: 100%; font-size: 1rem; }
        
        /* ESTADOS */
        .error-msg { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; margin-bottom: 15px; text-align: center; border: 1px solid #fca5a5; }
        .loading { text-align: center; color: #666; padding: 20px; font-weight: bold; display: none; }
        .stop-title { text-align: center; font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; color: #444; }
        .refresh-indicator { text-align: center; font-size: 0.85rem; color: #888; margin-bottom: 15px; height: 20px; font-style: italic; }
        
        /* TARJETAS DE BUS */
        .bus-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 40px; }
        .bus-card { background: var(--card); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); overflow: hidden; }
        .bus-card-content { padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: background 0.2s; }
        .bus-card-content:active { background: #f9f9f9; }
        .bus-line { background: var(--primary); color: white; padding: 8px 12px; border-radius: 6px; font-size: 1.2rem; font-weight: 900; min-width: 55px; text-align: center; }
        .bus-info { flex: 1; }
        .bus-dest { font-size: 0.85rem; color: #666; font-weight: 600; text-transform: uppercase; }
        .bus-time { font-size: 1.6rem; font-weight: 900; color: #059669; }
        .bus-time span { font-size: 0.8rem; font-weight: 500; color: #666; margin-left: 2px; }
        .blink { animation: flash 1s ease-out; }
        @keyframes flash { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* DESPLEGABLE ITINERARIO */
        .bus-itinerary { display: none; background: #fafafa; border-top: 1px solid #eee; padding: 15px; max-height: 250px; overflow-y: auto; }
        .itinerary-node { display: flex; align-items: center; gap: 15px; position: relative; padding: 8px 0; }
        .itinerary-node::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: #ccc; z-index: 1; }
        .itinerary-node:first-child::before { top: 50%; }
        .itinerary-node:last-child::before { bottom: 50%; }
        .node-dot { width: 16px; height: 16px; border-radius: 50%; z-index: 2; position: relative; border: 3px solid white; box-shadow: 0 0 3px rgba(0,0,0,0.2); }
        .node-name { font-size: 0.85rem; color: #444; }
        .loader-small { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 5px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="./assets/logo_donut.png" alt="Mr Donut" class="img-donut">
        <img src="https://cdn-icons-png.flaticon.com/512/3448/3448339.png" alt="Bus App Logo" class="img-app">
    </div>

    <div class="header"><h1>🚍 Bus BCN Pro</h1></div>
    <div id="map"></div> <div class="controls">
        <div class="input-group">
            <input type="number" id="stopCode" placeholder="Nº parada manual">
            <button onclick="searchManual()">Buscar</button>
        </div>
        <button class="btn-gps" onclick="searchGPS()">📍 Centrar Mapa y Actualizar</button>
    </div>

    <div id="errorBox" class="error-msg"></div>
    <div id="loading" class="loading"></div>
    
    <div id="stopTitle" class="stop-title"></div>
    <div id="refreshTimer" class="refresh-indicator"></div>
    <div id="results" class="bus-list"></div>

    <script>
        // --- CREDENCIALES ---
        const APP_ID = 'f87364db';
        const APP_KEY = 'fb9898a5d8988e645bba1a6eaa956b65';
        
        let countdownInterval;
        let secondsLeft = 20;
        
        // --- VARIABLES GOOGLE MAPS ---
        let map;
        let busMarkers = [];
        let userMarker = null;
        let routePolyline = null;
        let routeStopMarkers = [];
        let activeRouteLine = null;
        let activeRouteHTML = "";

        // Inicialización de Google Maps
        window.initMapGoogle = function() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: {lat: 41.3879, lng: 2.1699},
                zoom: 14,
                disableDefaultUI: true, // Quita botones innecesarios de Google
                zoomControl: true,
                styles: [ // Estilo limpio
                    { featureType: "poi.business", stylers: [{ visibility: "off" }] },
                    { featureType: "transit", elementType: "labels.icon", stylers: [{ visibility: "off" }] }
                ]
            });
            
            // Cuando el mapa esté listo, buscamos el GPS
            searchGPS();
        }

        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }, 3000);
        };

        function showError(msg) {
            document.getElementById('errorBox').innerText = msg;
            document.getElementById('errorBox').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            clearInterval(countdownInterval);
            document.getElementById('refreshTimer').innerText = '';
        }

        function hideMessages() {
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function clearRouteMap() {
            if (routePolyline) routePolyline.setMap(null);
            routeStopMarkers.forEach(m => m.setMap(null));
            routeStopMarkers = [];
            routePolyline = null;
        }

        function clearBusMarkers() {
            busMarkers.forEach(m => m.setMap(null));
            busMarkers = [];
        }

        function startAutoRefresh(stopCode, stopName) {
            clearInterval(countdownInterval);
            secondsLeft = 20;
            document.getElementById('refreshTimer').innerText = `🔄 Actualizando en ${secondsLeft}s`;

            countdownInterval = setInterval(() => {
                secondsLeft--;
                if (secondsLeft <= 0) {
                    secondsLeft = 20;
                    fetchBuses(stopCode, stopName, true);
                }
                document.getElementById('refreshTimer').innerText = `🔄 Actualizando en ${secondsLeft}s`;
            }, 1000);
        }

        async function fetchBuses(stopCode, stopName = "", isSilent = false) {
            if (!isSilent) {
                hideMessages();
                document.getElementById('results').innerHTML = '';
                document.getElementById('loading').style.display = 'block';
                document.getElementById('loading').innerText = "⏳ Consultando a TMB...";
                document.getElementById('refreshTimer').innerText = '';
                document.getElementById('stopCode').value = stopCode;
                
                clearRouteMap();
                activeRouteLine = null;
                activeRouteHTML = "";
            }
            
            try {
                const url = `https://api.tmb.cat/v1/ibus/stops/${stopCode}?app_id=${APP_ID}&app_key=${APP_KEY}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Parada no encontrada en TMB.');
                
                const data = await res.json();
                renderBuses(data.data.ibus, stopCode, stopName, isSilent);
                startAutoRefresh(stopCode, stopName);
            } catch (err) {
                if (!isSilent) showError("Error al obtener los buses: " + err.message);
            }
        }

        function renderBuses(buses, stopCode, stopName, isSilent) {
            hideMessages();
            const titleHtml = stopName ? 
                `📍 ${stopName} <br><small style="color:#888; font-size:0.85rem">Cód: ${stopCode}</small>` : 
                `📍 Parada: ${stopCode}`;
            document.getElementById('stopTitle').innerHTML = titleHtml;

            const container = document.getElementById('results');

            if (!buses || buses.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">No hay buses previstos para esta parada.</div>';
                return;
            }

            let html = '';
            buses.forEach(bus => {
                const animClass = isSilent ? 'blink' : '';
                const isExpanded = (bus.line === activeRouteLine);
                const displayStyle = isExpanded ? 'block' : 'none';
                const itinContent = isExpanded ? activeRouteHTML : '';

                html += `
                    <div class="bus-card">
                        <div class="bus-card-content ${animClass}" onclick="toggleRoute('${bus.line}', '${stopCode}', this.parentElement)">
                            <div class="bus-line">${bus.line}</div>
                            <div class="bus-info">
                                <div class="bus-dest">${bus.destination}</div>
                            </div>
                            <div class="bus-time">${bus['t-in-min']}<span>min</span></div>
                        </div>
                        <div class="bus-itinerary" data-line="${bus.line}" style="display: ${displayStyle};" onclick="event.stopPropagation()">
                            ${itinContent}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        async function toggleRoute(line, stopCode, cardElement) {
            const itineraryDiv = cardElement.querySelector('.bus-itinerary');
            
            if (itineraryDiv.style.display === 'block') {
                itineraryDiv.style.display = 'none';
                clearRouteMap();
                activeRouteLine = null;
                activeRouteHTML = "";
                return;
            }

            document.querySelectorAll('.bus-itinerary').forEach(el => el.style.display = 'none');
            clearRouteMap();
            
            activeRouteLine = line;
            itineraryDiv.style.display = 'block';
            itineraryDiv.innerHTML = '<div style="text-align:center; color:#666; padding: 10px;"><div class="loader-small"></div> Trazando ruta...</div>';

            try {
                const url = `https://api.tmb.cat/v1/transit/linies/bus/${line}/parades?app_id=${APP_ID}&app_key=${APP_KEY}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Ruta no disponible');
                
                const data = await res.json();
                const currentStopFeature = data.features.find(f => f.properties.CODI_PARADA == stopCode);
                if (!currentStopFeature) throw new Error('No se localiza el sentido del recorrido');

                const sentit = currentStopFeature.properties.SENTIT;
                const ordre = currentStopFeature.properties.ORDRE;

                let stops = data.features
                    .filter(f => f.properties.SENTIT === sentit && f.properties.ORDRE >= ordre)
                    .sort((a, b) => a.properties.ORDRE - b.properties.ORDRE);

                let html = '<div>';
                let routeCoords = [];
                let bounds = new google.maps.LatLngBounds();

                stops.forEach((stop, index) => {
                    const isFirst = index === 0;
                    const isLast = index === stops.length - 1;
                    const color = isFirst ? '#e30613' : (isLast ? '#059669' : '#4285F4');
                    
                    // Google usa {lat, lng} (TMB devuelve [lng, lat])
                    const latlng = {
                        lat: stop.geometry.coordinates[1],
                        lng: stop.geometry.coordinates[0]
                    };
                    routeCoords.push(latlng);
                    bounds.extend(latlng); // Expandir la vista del mapa

                    // Marcador de parada de la ruta
                    const routeMarker = new google.maps.Marker({
                        position: latlng,
                        map: map,
                        title: stop.properties.NOM_PARADA,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: (isFirst || isLast) ? 6 : 4,
                            fillColor: color,
                            fillOpacity: 1,
                            strokeWeight: 2,
                            strokeColor: "white"
                        }
                    });
                    routeStopMarkers.push(routeMarker);

                    html += `
                        <div class="itinerary-node">
                            <div class="node-dot" style="background: ${color}"></div>
                            <div class="node-name" style="font-weight: ${isFirst||isLast ? 'bold' : 'normal'}">${stop.properties.NOM_PARADA}</div>
                        </div>
                    `;
                });
                html += '</div>';

                // Trazar línea de ruta azul
                routePolyline = new google.maps.Polyline({
                    path: routeCoords,
                    geodesic: true,
                    strokeColor: '#4285F4',
                    strokeOpacity: 0.8,
                    strokeWeight: 4
                });
                routePolyline.setMap(map);
                
                // Centrar mapa en la ruta
                map.fitBounds(bounds);

                itineraryDiv.innerHTML = html;
                activeRouteHTML = html;

            } catch (err) {
                itineraryDiv.innerHTML = `<div style="color:var(--primary); text-align:center; padding:10px;">❌ ${err.message}</div>`;
                activeRouteHTML = itineraryDiv.innerHTML;
            }
        }

        function searchManual() {
            const code = document.getElementById('stopCode').value;
            if (!code || code.trim() === '') {
                showError("Escribe el código de la parada.");
                return;
            }
            clearInterval(countdownInterval); 
            fetchBuses(code.trim());
        }

        function searchGPS() {
            hideMessages();
            clearInterval(countdownInterval);
            document.getElementById('results').innerHTML = '';
            document.getElementById('stopTitle').innerHTML = '';
            document.getElementById('refreshTimer').innerText = '';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = "📍 Buscando señal GPS...";
            clearRouteMap();

            if (!navigator.geolocation) {
                showError("Tu móvil no soporta GPS.");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                document.getElementById('loading').innerText = "📡 Descargando mapa...";
                
                const userLatLng = {lat: lat, lng: lon};
                map.setCenter(userLatLng);
                map.setZoom(16);

                // Pintar usuario en el mapa
                if (userMarker) userMarker.setMap(null);
                userMarker = new google.maps.Marker({
                    position: userLatLng,
                    map: map,
                    title: "Tú estás aquí",
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 8,
                        fillColor: "#4285F4",
                        fillOpacity: 1,
                        strokeWeight: 3,
                        strokeColor: "#FFFFFF"
                    }
                });

                try {
                    // Seguimos usando Overpass para sacar los códigos de TMB porque Google Maps no los proporciona fácilmente
                    const query = `[out:json][timeout:10];node["highway"="bus_stop"](around:400,${lat},${lon});out body;`;
                    const osmRes = await fetch("https://overpass-api.de/api/interpreter", {
                        method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: `data=${encodeURIComponent(query)}`
                    });
                    
                    if (!osmRes.ok) throw new Error("Los mapas no responden.");
                    const osmData = await osmRes.json();
                    
                    if (!osmData.elements || osmData.elements.length === 0) {
                        showError("No estás a menos de 400m de ninguna parada.");
                        return;
                    }

                    const stops = osmData.elements.map(e => {
                        let codeStr = e.tags.ref || e.tags['tmb:ref'] || e.tags['local_ref'] || "";
                        let cleanCode = codeStr.replace(/\D/g, ''); 
                        return {
                            ref: (cleanCode.length > 0 && cleanCode.length <= 4) ? cleanCode : null,
                            name: e.tags.name || `Parada ${cleanCode}`,
                            lat: e.lat, lon: e.lon,
                            dist: getDistance(lat, lon, e.lat, e.lon)
                        };
                    }).filter(e => e.ref !== null).sort((a, b) => a.dist - b.dist);

                    if (stops.length === 0) {
                        showError("Hay paradas cerca, pero no tienen código.");
                        return;
                    }

                    clearBusMarkers();
                    stops.forEach(stop => {
                        const marker = new google.maps.Marker({
                            position: {lat: stop.lat, lng: stop.lon},
                            map: map,
                            title: stop.name,
                            label: "🚏" // Icono de parada nativo de Google Maps (emoji)
                        });
                        
                        marker.addListener('click', () => {
                            map.setZoom(17);
                            map.panTo(marker.getPosition());
                            fetchBuses(stop.ref, stop.name);
                        });
                        busMarkers.push(marker);
                    });

                    document.getElementById('loading').innerText = "⏱️ Conectando con los buses...";
                    
                    let found = false;
                    for (let i = 0; i < Math.min(stops.length, 3); i++) {
                        const stop = stops[i];
                        const tmbRes = await fetch(`https://api.tmb.cat/v1/ibus/stops/${stop.ref}?app_id=${APP_ID}&app_key=${APP_KEY}`);
                        
                        if (tmbRes.ok) {
                            const data = await tmbRes.json();
                            if (data.data && data.data.ibus && data.data.ibus.length > 0) {
                                document.getElementById('stopCode').value = stop.ref;
                                renderBuses(data.data.ibus, stop.ref, stop.name, false);
                                startAutoRefresh(stop.ref, stop.name);
                                found = true;
                                break;
                            }
                        }
                    }

                    if (!found) fetchBuses(stops[0].ref, stops[0].name);

                } catch (err) {
                    showError("Error de red al buscar en el mapa: " + err.message);
                }
            }, (err) => {
                showError("No has dado permiso al GPS o está desactivado.");
            }, { timeout: 10000 });
        }
    </script>
    
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY_DE_GOOGLE_AQUI&callback=initMapGoogle"></script>

</body>
</html>
