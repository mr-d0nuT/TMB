name: Actualiza horarios Hispano Igualadina

on:
  schedule:
    - cron: '20 4 * * 1'   # lunes 04:20 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Regenerar hispano-igualadina.json desde el GTFS de la Generalitat
        run: python3 scripts/build_hispano.py
      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hispano-igualadina.json
          git diff --cached --quiet && echo "Sin cambios" || git commit -m "Horarios Hispano Igualadina actualizados (GTFS Generalitat)"
          git push
